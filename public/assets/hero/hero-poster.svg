<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ece4d8"/>
      <stop offset="1" stop-color="#d9cfbf"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="560" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b60e12"/>
      <stop offset="0.58" stop-color="#df2025"/>
      <stop offset="1" stop-color="#971114"/>
    </linearGradient>
    <radialGradient id="flagGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 108) rotate(7) scale(340 154)">
      <stop stop-color="#ff8b8f" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#ff8b8f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="portraitFade" x1="700" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f3ebde"/>
      <stop offset="1" stop-color="#d5cab9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7a0f11" flood-opacity="0.26"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#6d140f" flood-opacity="0.35"/>
    </filter>
    <clipPath id="portraitClip">
      <rect x="690" y="28" width="470" height="644" rx="18"/>
    </clipPath>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="650" width="550" height="700" fill="url(#portraitFade)"/>

  <path
    d="M0 0H710C646 40 625 95 599 148C572 203 517 247 435 279C348 313 220 329 0 329V0Z"
    fill="url(#flag)"
  />
  <path
    d="M0 10H666C611 51 588 103 559 145C532 187 480 230 405 261C328 293 199 309 0 309V10Z"
    fill="url(#flagGlow)"
  />
  <path
    d="M8 18H622C578 47 554 87 533 129C506 184 451 220 371 251C293 281 175 294 8 295V18Z"
    fill="rgba(255,255,255,0.16)"
  />

  <g filter="url(#softShadow)">
    <text x="98" y="152" fill="#f8d728" font-size="178" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
      &#9773;
    </text>
  </g>

  <g filter="url(#textShadow)">
    <text x="118" y="390" fill="#a10000" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="800">
      TỔNG BÍ THƯ
    </text>
    <text x="106" y="492" fill="#f6a311" font-size="98" font-family="Arial, Helvetica, sans-serif" font-weight="900">
      LÊ DUẨN
    </text>
    <text x="18" y="594" fill="#b11212" font-size="54" font-family="Arial, Helvetica, sans-serif" font-style="italic" font-weight="700">
      Một trí tuệ lớn, một nhân cách lớn
    </text>
  </g>

  <g clip-path="url(#portraitClip)">
    <rect x="690" y="28" width="470" height="644" fill="#efe6d8"/>
    <image
      href="/assets/hero/le-duan-portrait.png"
      x="665"
      y="0"
      width="560"
      height="700"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>

  <rect x="690" y="28" width="470" height="644" rx="18" stroke="#d7ccb9" stroke-width="2" stroke-opacity="0.75"/>
  <path d="M648 0C687 46 707 99 708 159C710 221 689 275 647 323" stroke="#d2c5b1" stroke-width="3" stroke-opacity="0.6"/>
</svg>
